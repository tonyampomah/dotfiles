##############################
### WINDOWS AND WORKSPACES ###
##############################
windowrule = match:class firefox, workspace 1
windowrule = match:class google-chrome, workspace 1
windowrule = match:class brave-browser, workspace 1
windowrule = match:class chromium-browser, workspace 1
windowrule = match:class emacs, workspace 2
windowrule = match:class code-oss, workspace 2
windowrule = match:class teams, workspace 3
windowrule = match:class wasistlos, workspace 3
windowrule = match:class slack, workspace 3
windowrule = match:class Slack, workspace 3
windowrule = match:class org.mozilla.Thunderbird, workspace 4
windowrule = match:class dbeaver, workspace 5
windowrule = match:class insomnia, workspace 6
windowrule = match:class calibre-gui, workspace 7
windowrule = match:class libreoffice-writer, workspace 7
windowrule = match:class libreoffice-calc, workspace 7
windowrule = match:class libreoffice-base, workspace 7
windowrule = match:class libreoffice-draw, workspace 7
windowrule = match:class libreoffice-impress, workspace 7
windowrule = match:class libreoffice-startcenter, workspace 7
windowrule = match:class libreoffice-math, workspace 7
windowrule = match:class VirtualBox Manager, workspace 8
windowrule = match:class VirtualBox Machine, workspace 8
windowrule = match:class Steam, workspace 9
windowrule = match:class org.gnome.Rhythmbox3, workspace 10
windowrule = match:class Mixx, workspace 10

windowrule = opacity 0.9 0.9, match:class emacs
windowrule = opacity 0.9 0.9, match:class kitty

workspace = 1, default:true, layout:scrolling
workspace = 2, layout:dwindle
workspace = 3, layout:dwindle
workspace = 7, layout:scrolling
workspace = 9, layout:monocle