###############################################################################
#                                 KEYBINDINGS                                 #
###############################################################################
$mainMod = ALT # Sets "Windows" key as main modifier
$terminal = kitty
$fileManager = nautilus
$menu = fuzzel
###############################################################################
#                                MOD + BINDINGS                               #
###############################################################################
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, R, exec, hyprctl reload
bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen,
bind = $mainMod, Space, exec, $menu
bind = $mainMod, TAB,workspace,previous
bind = $mainMod, G, exec, hyprctl keyword general:gaps_in 0 && hyprctl keyword general:gaps_out 0
bind = $mainMod, I, exec, ~/.config/rofi/bin/pass
bind = $mainMod, B, exec, ~/.config/fuzzel/bin/bookmark

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move focus with mainMod + vim keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

###############################################################################
#                             MOD + SHIFT BINDINGS                            #
###############################################################################
bind = $mainMod SHIFT, B, exec, pkill -SIGUSR1 waybar
bind = $mainMod SHIFT, W, exec, pkill waybar && waybar &
bind = $mainMod SHIFT, G, exec, hyprctl keyword general:gaps_in 10 && hyprctl keyword general:gaps_out 20
bind = $mainMod SHIFT, F, togglefloating,
bind = $mainMod SHIFT, Return, exec, $fileManager
bind = $mainMod SHIFT, E, exec, wlogout
# bind = $mainMod SHIFT, R, submap, resize
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp -d)" - | wl-copy

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, down, movewindow, d

###############################################################################
#                             SUPER + CTRL BINDINGS                             #
###############################################################################
bind = SUPER CTRL, Q, exec, hyprlock

###############################################################################
#                             MOD + CTRL BINDINGS                             #
###############################################################################
# Window resizing                           X  Y
bind = $mainMod CTRL, left,  resizeactive, -60 0
bind = $mainMod CTRL, right, resizeactive,  60 0
bind = $mainMod CTRL, up,    resizeactive,  0 -60
bind = $mainMod CTRL, down,  resizeactive,  0  60

bind = $mainMod CTRL, h,  resizeactive, -60 0
bind = $mainMod CTRL, l, resizeactive,  60 0
bind = $mainMod CTRL, k,    resizeactive,  0 -60
bind = $mainMod CTRL, j,  resizeactive,  0  60

bind = $mainMod SUPER, D, exec, gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
bind = $mainMod SUPER, L, exec, gsettings set org.gnome.desktop.interface color-scheme 'prefer-light'
bind = $mainMod SUPER, E, exec, emacs
bind = $mainMod SUPER, Q, exec, qutebrowser
bind = $mainMod SUPER, S, exec, slack
bind = $mainMod SUPER, T, exec, teams
bind = $mainMod SUPER, F, exec, firefox
bind = $mainMod SUPER, G, exec, chromium-browser -no-default-browser-check
bind = $mainMod SUPER, B, exec, brave -no-default-browser-check
bind = $mainMod SUPER, W, exec, wasistlos
bind = $mainMod SUPER, Z, exec, zoom
bind = $mainMod SUPER, I, exec, insomnia
bind = $mainMod SUPER, C, exec, calibre
# bind = $mainMod SUPER, M, exec, xfce4-settings-manager

###############################################################################
#                                MISC BINDINGS                                #
###############################################################################
# Clamshell mode configuration
## Lid is opened
# bindl=,switch:off:Lid Switch,exec,~/.config/hypr/lid.sh open
## Lid is closed
# bindl=,switch:on:Lid Switch,exec,~/.config/hypr/lid.sh close

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindel = $mainMod, XF86MonBrightnessUp, exec, brightnessctl s 1%+
bindel = $mainMod, XF86MonBrightnessDown, exec, brightnessctl s 1%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

binds {
    movefocus_cycles_fullscreen = 1
}

# Create/open kitty automatically when scratchpad is empty
workspace = special:term, on-created-empty:[float; size 80% 70%; center] kitty
workspace = special:music, on-created-empty:[float; size 80% 70%; center] kitty -- ncmpcpp
workspace = special:volume, on-created-empty:[float; size 80% 80%; center] pavucontrol

# Toggle scratchpad
bind = $mainMod, T, togglespecialworkspace, term
bind = $mainMod, M, togglespecialworkspace, music
bind = $mainMod SUPER, V, togglespecialworkspace, volume